<!DOCTYPE html>
<html>
<head>
    <title>Lite Screencast</title>
    <style>
        body { margin: 0; background: #222; display: flex; flex-direction: column; align-items: center; }
        #view { max-width: 100%; cursor: crosshair; border: 2px solid #444; }
        .controls { color: white; padding: 10px; font-family: sans-serif; display: flex; align-items: center; gap: 8px; }
        #status { font-size: 12px; color: #aaa; }
        #status.connected { color: #4c4; }
        #status.error { color: #f66; }
    </style>
</head>
<body>
    <div class="controls">
        <input type="text" id="wsUrl" placeholder="ws://localhost:3000/..." style="width: 300px;">
        <button onclick="connect()">Cast Browser Window</button>
        <span id="status">disconnected</span>
        <span style="margin: 0 10px; border-left: 1px solid #666; height: 20px;"></span>
        <input type="text" id="navUrl" placeholder="https://..." style="width: 300px;" onkeydown="if(event.key === 'Enter') navigate()">
        <button onclick="navigate()">Go</button>
    </div>
    <img id="view">

    <script>
        let ws;
        let contentWidth = 0, contentHeight = 0;
        let isComposing = false;
        let cmdId = 10;
        const view   = document.getElementById('view');
        const status = document.getElementById('status');

        // 隐藏 input：专门用于接收键盘 / IME 输入，不影响页面布局
        const keyInput = document.createElement('input');
        keyInput.type = 'text';
        keyInput.style.cssText = 'position:fixed;opacity:0;width:1px;height:1px;top:0;left:0;pointer-events:none;';
        document.body.appendChild(keyInput);

        function setStatus(s) {
            status.textContent = s;
            status.className = s;
        }

        function send(obj) {
            if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ id: cmdId++, ...obj }));
        }

        (function initFromQuery() {
            const params = new URLSearchParams(location.search);
            let url = '';
            if (params.has('wss')) url = 'wss://' + params.get('wss');
            else if (params.has('ws')) url = 'ws://' + params.get('ws');
            if (url) {
                document.getElementById('wsUrl').value = url;
                connect();
            }
        })();

        function navigate() {
            if (ws?.readyState !== WebSocket.OPEN) return;
            let url = document.getElementById('navUrl').value.trim();
            if (!url) return;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            send({ method: "Page.navigate", params: { url } });
        }

        function connect() {
            // 防止重复连接
            if (ws) { ws.onclose = null; ws.close(); }
            const url = document.getElementById('wsUrl').value;
            setStatus('connecting…');
            ws = new WebSocket(url);

            ws.onopen = () => {
                setStatus('connected');
                // 1. 开启 Page 域
                send({ id: 1, method: "Page.enable" });
                // 2. 开始投屏
                send({ id: 2, method: "Page.startScreencast", params: { format: "jpeg", quality: 60, maxWidth: 1280 } });
            };

            ws.onmessage = (msg) => {
                const response = JSON.parse(msg.data);
                // 3. 处理每一帧
                if (response.method === "Page.screencastFrame") {
                    const { data, metadata, sessionId } = response.params;
                    if (metadata) { contentWidth = metadata.deviceWidth; contentHeight = metadata.deviceHeight; }
                    // 4. 图片渲染完成后再 Ack，避免帧堆积
                    view.onload = () => {
                        view.onload = null;
                        send({ method: 'Page.screencastFrameAck', params: { sessionId } });
                    };
                    view.src = "data:image/jpeg;base64," + data;
                }
            };

            ws.onclose = () => setStatus('disconnected');
            ws.onerror = () => setStatus('error');
        }

        // --- 鼠标操作（点击、移动、拖拽） ---
        function getMousePos(e) {
            const rect = view.getBoundingClientRect();
            const scaleX = contentWidth  ? contentWidth  / rect.width  : 1;
            const scaleY = contentHeight ? contentHeight / rect.height : 1;
            const x = Math.round((e.clientX - rect.left) * scaleX);
            const y = Math.round((e.clientY - rect.top)  * scaleY);
            return { x, y };
        }

        const buttonMap = { 0: 'left', 1: 'middle', 2: 'right' };
        const buttonsMap = { 0: 1, 1: 4, 2: 2 }; // e.button to Input.dispatchMouseEvent buttons mask

        let isDragging = false;

        view.onmousedown = (e) => {
            e.preventDefault();
            keyInput.focus();
            if (ws?.readyState !== WebSocket.OPEN) return;
            isDragging = true;
            const { x, y } = getMousePos(e);
            const button = buttonMap[e.button] || 'none';
            const buttons = buttonsMap[e.button] || 0;
            send({ method: 'Input.dispatchMouseEvent', params: { type: 'mousePressed', x, y, button, buttons, clickCount: 1 } });
        };

        view.onmousemove = (e) => {
            if (ws?.readyState !== WebSocket.OPEN) return;
            const { x, y } = getMousePos(e);
            const button = isDragging ? (buttonMap[e.button] || 'none') : 'none';
            // Note: During drag e.buttons has the mask of pressed buttons, otherwise 0
            send({ method: 'Input.dispatchMouseEvent', params: { type: 'mouseMoved', x, y, button, buttons: e.buttons || 0 } });
        };

        view.onmouseup = (e) => {
            e.preventDefault();
            if (ws?.readyState !== WebSocket.OPEN) return;
            isDragging = false;
            const { x, y } = getMousePos(e);
            const button = buttonMap[e.button] || 'none';
            send({ method: 'Input.dispatchMouseEvent', params: { type: 'mouseReleased', x, y, button, buttons: 0, clickCount: 1 } });
        };

        view.oncontextmenu = (e) => {
            e.preventDefault();
        };

        // --- 鼠标滚轮 ---
        view.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (ws?.readyState !== WebSocket.OPEN) return;
            const rect = view.getBoundingClientRect();
            const scaleX = contentWidth  ? contentWidth  / rect.width  : 1;
            const scaleY = contentHeight ? contentHeight / rect.height : 1;
            const x = Math.round((e.clientX - rect.left) * scaleX);
            const y = Math.round((e.clientY - rect.top)  * scaleY);
            send({ method: 'Input.dispatchMouseEvent', params: {
                type: 'mouseWheel', x, y,
                deltaX: e.deltaX * scaleX,
                deltaY: e.deltaY * scaleY,
                modifiers: 0,
            }});
        }, { passive: false });

        // --- 键盘输入 ---
        // IME 输入法：组合开始
        keyInput.addEventListener('compositionstart', () => { isComposing = true; });

        // IME 输入法：确认选词 → 用 insertText 注入最终文字
        keyInput.addEventListener('compositionend', (e) => {
            isComposing = false;
            if (e.data) send({ method: 'Input.insertText', params: { text: e.data } });
            keyInput.value = '';
        });

        keyInput.addEventListener('input', (e) => {
            // 已在 keydown/keypress 中处理，清理 value
            if (!isComposing) keyInput.value = '';
        });

        keyInput.addEventListener('keydown', (e) => {
            if (isComposing) return;
            // 阻止大部分按键的默认行为（除了 F12、F5 等必要的浏览器快捷键）
            if (e.key !== 'F12' && !(e.key === 'F5' || (e.ctrlKey && e.key === 'r'))) {
                e.preventDefault();
            }

            const modifiers = (e.altKey ? 1 : 0) | (e.ctrlKey ? 2 : 0) | (e.metaKey ? 4 : 0) | (e.shiftKey ? 8 : 0);
            const base = {
                type: 'keyDown',
                modifiers: modifiers,
                windowsVirtualKeyCode: e.keyCode,
                code: e.code,
                key: e.key,
                text: e.key.length === 1 ? e.key : '',
                unmodifiedText: e.key.length === 1 ? e.key : '',
                autoRepeat: e.repeat,
                isKeypad: e.location === 3
            };

            // 对普通字符发 char（keyDown + char + keyUp 组合）
            send({ method: 'Input.dispatchKeyEvent', params: base });
        });

        keyInput.addEventListener('keyup', (e) => {
            if (isComposing) return;
            const modifiers = (e.altKey ? 1 : 0) | (e.ctrlKey ? 2 : 0) | (e.metaKey ? 4 : 0) | (e.shiftKey ? 8 : 0);
            const base = {
                type: 'keyUp',
                modifiers: modifiers,
                windowsVirtualKeyCode: e.keyCode,
                code: e.code,
                key: e.key,
                isKeypad: e.location === 3
            };
            send({ method: 'Input.dispatchKeyEvent', params: base });
        });
    </script>
</body>
</html>
