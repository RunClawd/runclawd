<!DOCTYPE html>
<html>
<head>
    <title>Lite Screencast</title>
    <style>
        html, body { margin: 0; height: 100%; overflow: hidden; }
        body { background: #222; display: flex; flex-direction: column; align-items: stretch; }
        #view { flex: 1; width: 100%; min-height: 0; object-fit: contain; cursor: crosshair; display: block; }
        .controls { color: white; padding: 6px 10px; font-family: sans-serif; display: flex; align-items: center; gap: 6px; }
        .nav-btn { background: #333; border: 1px solid #555; color: #ccc; border-radius: 4px; width: 28px; height: 28px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; padding: 0; }
        .nav-btn:hover { background: #444; color: #fff; }
        .nav-btn:disabled { opacity: 0.35; cursor: default; }
        #navUrl { flex: 1; }
        #status { font-size: 12px; color: #aaa; margin-left: auto; white-space: nowrap; }
        #status.connected { color: #4c4; }
        #status.error { color: #f66; }
    </style>
</head>
<body>
    <div class="controls">
        <button class="nav-btn" id="btnBack"    onclick="historyGo(-1)" title="Back">&#8592;</button>
        <button class="nav-btn" id="btnForward" onclick="historyGo(1)"  title="Forward">&#8594;</button>
        <button class="nav-btn" id="btnReload"  onclick="reload()"      title="Reload">&#8635;</button>
        <input type="text" id="navUrl" placeholder="https://..." onkeydown="if(event.key === 'Enter') navigate()">
        <button onclick="navigate()">Go</button>
        <span id="status">disconnected</span>
    </div>
    <img id="view">

    <script>
        let ws;
        let contentWidth = 0, contentHeight = 0;

        function getViewSize() {
            const rect = view.getBoundingClientRect();
            return { width: Math.round(rect.width) || window.innerWidth,
                     height: Math.round(rect.height) || window.innerHeight };
        }

        function setRemoteViewport() {
            if (ws?.readyState !== WebSocket.OPEN) return;
            const { width, height } = getViewSize();
            send({ method: 'Emulation.setDeviceMetricsOverride', params: {
                width, height, deviceScaleFactor: window.devicePixelRatio || 1, mobile: false
            }});
        }
        let isComposing = false;
        let cmdId = 10;
        const view   = document.getElementById('view');
        const status = document.getElementById('status');

        // 隐藏 input：专门用于接收键盘 / IME 输入，不影响页面布局
        const keyInput = document.createElement('input');
        keyInput.type = 'text';
        keyInput.style.cssText = 'position:fixed;opacity:0;width:1px;height:1px;top:0;left:0;pointer-events:none;';
        document.body.appendChild(keyInput);

        function setStatus(s) {
            status.textContent = s;
            status.className = s;
        }

        function send(obj) {
            if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ id: cmdId++, ...obj }));
        }

        let wsConnectUrl = '';
        (function initFromQuery() {
            const params = new URLSearchParams(location.search);
            if (params.has('wss')) wsConnectUrl = 'wss://' + params.get('wss');
            else if (params.has('ws')) wsConnectUrl = 'ws://' + params.get('ws');
            if (wsConnectUrl) connect();
        })();

        function historyGo(delta) {
            if (ws?.readyState !== WebSocket.OPEN) return;
            send({ method: delta < 0 ? 'Page.goBack' : 'Page.goForward', params: {} });
        }

        function reload() {
            if (ws?.readyState !== WebSocket.OPEN) return;
            send({ method: 'Page.reload', params: {} });
        }

        function navigate() {
            if (ws?.readyState !== WebSocket.OPEN) return;
            let url = document.getElementById('navUrl').value.trim();
            if (!url) return;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            send({ method: "Page.navigate", params: { url } });
        }

        function connect() {
            // 防止重复连接
            if (ws) { ws.onclose = null; ws.close(); }
            const url = wsConnectUrl;
            setStatus('connecting…');
            ws = new WebSocket(url);

            ws.onopen = () => {
                setStatus('connected');
                // 1. 开启 Page 域
                send({ id: 1, method: "Page.enable" });
                // 2. 将远端视口对齐到客户端窗口大小，再开始投屏
                requestAnimationFrame(() => {
                    const { width, height } = getViewSize();
                    send({ method: 'Emulation.setDeviceMetricsOverride', params: {
                        width, height, deviceScaleFactor: window.devicePixelRatio || 1, mobile: false
                    }});
                    send({ id: 2, method: "Page.startScreencast", params: { format: "jpeg", quality: 60, maxWidth: width, maxHeight: height } });
                    send({ id: 3, method: "Page.getNavigationHistory" });
                });
            };

            ws.onmessage = (msg) => {
                const response = JSON.parse(msg.data);
                // 3. 处理每一帧
                if (response.id === 3 && response.result?.entries) {
                    const entries = response.result.entries;
                    const current = entries[response.result.currentIndex];
                    if (current?.url && !current.url.startsWith('about:')) {
                        document.getElementById('navUrl').value = current.url;
                    }
                }
                if (response.method === "Page.frameNavigated") {
                    const url = response.params?.frame?.url;
                    if (url && !url.startsWith('about:')) {
                        document.getElementById('navUrl').value = url;
                    }
                }
                if (response.method === "Page.screencastFrame") {
                    const { data, metadata, sessionId } = response.params;
                    if (metadata) { contentWidth = metadata.deviceWidth; contentHeight = metadata.deviceHeight; }
                    // 4. 图片渲染完成后再 Ack，避免帧堆积
                    view.onload = () => {
                        view.onload = null;
                        send({ method: 'Page.screencastFrameAck', params: { sessionId } });
                    };
                    view.src = "data:image/jpeg;base64," + data;
                }
            };

            ws.onclose = () => setStatus('disconnected');
            ws.onerror = () => setStatus('error');
        }

        // --- 鼠标操作（点击、移动、拖拽） ---
        function getMousePos(e) {
            const rect = view.getBoundingClientRect();
            const scaleX = contentWidth  ? contentWidth  / rect.width  : 1;
            const scaleY = contentHeight ? contentHeight / rect.height : 1;
            const x = Math.round((e.clientX - rect.left) * scaleX);
            const y = Math.round((e.clientY - rect.top)  * scaleY);
            return { x, y };
        }

        const buttonMap = { 0: 'left', 1: 'middle', 2: 'right' };
        const buttonsMap = { 0: 1, 1: 4, 2: 2 }; // e.button to Input.dispatchMouseEvent buttons mask

        let isDragging = false;

        view.onmousedown = (e) => {
            e.preventDefault();
            keyInput.focus();
            if (ws?.readyState !== WebSocket.OPEN) return;
            isDragging = true;
            const { x, y } = getMousePos(e);
            const button = buttonMap[e.button] || 'none';
            const buttons = buttonsMap[e.button] || 0;
            send({ method: 'Input.dispatchMouseEvent', params: { type: 'mousePressed', x, y, button, buttons, clickCount: 1 } });
        };

        view.onmousemove = (e) => {
            if (ws?.readyState !== WebSocket.OPEN) return;
            const { x, y } = getMousePos(e);
            let button = 'none';
            if (isDragging) {
                if (e.buttons & 1) button = 'left';
                else if (e.buttons & 2) button = 'right';
                else if (e.buttons & 4) button = 'middle';
            }
            send({ method: 'Input.dispatchMouseEvent', params: { type: 'mouseMoved', x, y, button, buttons: e.buttons || 0 } });
        };

        view.onmouseup = (e) => {
            e.preventDefault();
            if (ws?.readyState !== WebSocket.OPEN) return;
            isDragging = false;
            const { x, y } = getMousePos(e);
            const button = buttonMap[e.button] || 'none';
            send({ method: 'Input.dispatchMouseEvent', params: { type: 'mouseReleased', x, y, button, buttons: 0, clickCount: 1 } });
        };

        window.addEventListener('resize', () => {
            setRemoteViewport();
        });

        view.oncontextmenu = (e) => {
            e.preventDefault();
        };

        // --- 鼠标滚轮 ---
        view.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (ws?.readyState !== WebSocket.OPEN) return;
            const rect = view.getBoundingClientRect();
            const scaleX = contentWidth  ? contentWidth  / rect.width  : 1;
            const scaleY = contentHeight ? contentHeight / rect.height : 1;
            const x = Math.round((e.clientX - rect.left) * scaleX);
            const y = Math.round((e.clientY - rect.top)  * scaleY);
            send({ method: 'Input.dispatchMouseEvent', params: {
                type: 'mouseWheel', x, y,
                deltaX: e.deltaX * scaleX,
                deltaY: e.deltaY * scaleY,
                modifiers: 0,
            }});
        }, { passive: false });

        // --- 键盘输入 ---
        // IME 输入法：组合开始
        keyInput.addEventListener('compositionstart', () => { isComposing = true; });

        // IME 输入法：确认选词 → 用 insertText 注入最终文字
        keyInput.addEventListener('compositionend', (e) => {
            isComposing = false;
            if (e.data) send({ method: 'Input.insertText', params: { text: e.data } });
            keyInput.value = '';
        });

        keyInput.addEventListener('input', (e) => {
            // 已在 keydown/keypress 中处理，清理 value
            if (!isComposing) keyInput.value = '';
        });

        keyInput.addEventListener('keydown', (e) => {
            if (isComposing || e.keyCode === 229) return;
            // 阻止大部分按键的默认行为（除了 F12、F5 等必要的浏览器快捷键）
            if (e.key !== 'F12' && !(e.key === 'F5' || (e.ctrlKey && e.key === 'r'))) {
                e.preventDefault();
            }

            const modifiers = (e.altKey ? 1 : 0) | (e.ctrlKey ? 2 : 0) | (e.metaKey ? 4 : 0) | (e.shiftKey ? 8 : 0);
            const base = {
                type: 'keyDown',
                modifiers: modifiers,
                windowsVirtualKeyCode: e.keyCode,
                code: e.code,
                key: e.key,
                text: e.key.length === 1 ? e.key : '',
                unmodifiedText: e.key.length === 1 ? e.key : '',
                autoRepeat: e.repeat,
                isKeypad: e.location === 3
            };

            // 对普通字符发 char（keyDown + char + keyUp 组合）
            send({ method: 'Input.dispatchKeyEvent', params: base });
        });

        keyInput.addEventListener('keyup', (e) => {
            if (isComposing) return;
            const modifiers = (e.altKey ? 1 : 0) | (e.ctrlKey ? 2 : 0) | (e.metaKey ? 4 : 0) | (e.shiftKey ? 8 : 0);
            const base = {
                type: 'keyUp',
                modifiers: modifiers,
                windowsVirtualKeyCode: e.keyCode,
                code: e.code,
                key: e.key,
                isKeypad: e.location === 3
            };
            send({ method: 'Input.dispatchKeyEvent', params: base });
        });
    </script>
</body>
</html>
